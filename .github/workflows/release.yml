name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_suffix: linux-x86_64
          - runner: ubuntu-24.04-arm
            asset_suffix: linux-aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Build release binary
        run: nix build .#default

      - name: Package release artifact
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          asset="parsecos-${tag}-${{ matrix.asset_suffix }}"
          mkdir -p dist
          cp result/bin/parsecos dist/parsecos
          chmod +x dist/parsecos
          tar -C dist -czf "dist/${asset}.tar.gz" parsecos
          sha256sum "dist/${asset}.tar.gz" > "dist/${asset}.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_suffix }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
